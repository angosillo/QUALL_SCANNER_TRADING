[scan]
name = "One-Month Gainers"
id = "one_month_gainers"
description = "Top 3% strongest stocks over past 1 month"
frequency = "daily"
side = "long"
enabled = true

[universe]
type = "us_listed"

[filters.price]
min = 1.0

[filters.volume]
min_avg_volume = 40000
min_dollar_volume = 1500000

[filters.adr_percent]
min = 2.5
period = 20

[filters.rank]
metric = "price_growth"
period_days = 21
percentile = "top"
threshold = 3.0

[scoring]
enabled = true
momentum_weight = 0.30
trend_weight = 0.25
volume_weight = 0.20
volatility_weight = 0.15
relative_strength_weight = 0.10

[display]
fields = ["symbol", "close", "volume", "dollar_volume", "adr_pct_20", "trend_intensity", "price_growth_1m", "composite_score"]
sort_by = "price_growth_1m"
sort_order = "desc"
